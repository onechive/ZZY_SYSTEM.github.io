<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verification</title>
    <link href="https://fonts.cdnfonts.com/css/dune-rise" rel="stylesheet">
    <link rel="stylesheet" href="intro.css">
</head>

<body>
    <!-- Background WebGL Canvas for Ripple Distortion -->
    <canvas id="ripple-canvas"></canvas>

    <div class="overlay">
        <!-- Glassmorphism Card -->
        <div class="popup-card" id="popup-card">

            <!-- Default Verification UI -->
            <div id="verify-ui" class="verify-ui">
                <h2 class="dune-font">Please verify that you are not a robot</h2>
                <button class="verify-btn" id="verify-btn">OK</button>
            </div>

            <!-- Loading UI (Circular Text) -->
            <div id="loading-ui" class="loading-ui hidden">
                <svg class="circular-text" viewBox="0 0 100 100">
                    <path id="circlePath" d="M 50, 50 m -35, 0 a 35,35 0 1,1 70,0 a 35,35 0 1,1 -70,0" fill="none" />
                    <text>
                        <!-- 'LOADING • ' repeated to fill the circle -->
                        <textPath href="#circlePath" startOffset="0%" textLength="220">
                            LOADING • LOADING • LOADING •
                        </textPath>
                    </text>
                </svg>
            </div>

            <!-- Success UI -->
            <div id="success-ui" class="success-ui hidden">
                <h2 class="dune-font">Confirmed</h2>
            </div>

        </div>
    </div>

    <script src="intro.js"></script>
</body>

</html>
