<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scroll Reveal Component</title>
    <!--
    Core Idea: 
    This component uses an IntersectionObserver to detect when a container element enters the viewport. 
    Once visible, it iterates through its children elements and applies a CSS class (`.is-visible`) 
    with a staggered delay. The delay is controlled via a JavaScript variable matching the requested 
    default of 120ms. It also respects the `prefers-reduced-motion` media query to disable 
    animations for accessibility.
    -->
    <style>
        /* Base Page Styles */
        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: sans-serif;
            overflow-x: hidden;
        }
        
        .spacer {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #333;
        }

        /* Component Styles */
        .reveal-container {
            padding: 100px 50px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .reveal-item {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.6s ease-out, transform 0.6s ease-out;
            padding: 20px;
            background: #222;
            border-radius: 8px;
            font-size: 1.2rem;
            text-align: center;
        }

        .reveal-item.is-visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* Accessibility: Reduce Motion */
        @media (prefers-reduced-motion: reduce) {
            .reveal-item {
                transition: none !important;
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="spacer">
        <h1>Scroll Down</h1>
    </div>

    <!-- The Component Markup -->
    <div class="reveal-container" data-stagger="120">
        <div class="reveal-item">HOME</div>
        <div class="reveal-item">TEAM</div>
        <div class="reveal-item">PRODUCT</div>
        <div class="reveal-item">CONTACT</div>
    </div>
    
    <div class="spacer">
        <p>Keep scrolling up and down</p>
    </div>

    <!-- The Component Script -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const containers = document.querySelectorAll('.reveal-container');

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const items = entry.target.querySelectorAll('.reveal-item');
                    // Respect prefers-reduced-motion
                    const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

                    if (entry.isIntersecting) {
                        // Tunable parameter: default 120ms
                        const staggerMs = parseInt(entry.target.dataset.stagger) || 120;
                        
                        items.forEach((item, index) => {
                            if (prefersReducedMotion) {
                                item.classList.add('is-visible');
                            } else {
                                setTimeout(() => {
                                    item.classList.add('is-visible');
                                }, index * staggerMs);
                            }
                        });
                    } else {
                        // Reset when off-screen
                        items.forEach(item => item.classList.remove('is-visible'));
                    }
                });
            }, {
                threshold: 0.1
            });

            containers.forEach(container => observer.observe(container));
        });
    </script>
</body>
</html>
